name: Remove stale systemd branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Delete stale branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/cleanup/systemd-service-v2"
      - name: Remove this workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remove-systemd-branch.yml
          git commit -m "remove branch cleanup"
          git push origin HEAD:main
