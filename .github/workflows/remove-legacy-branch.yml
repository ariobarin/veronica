name: Remove legacy branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete obsolete branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for branch in ario-accept-legacy-command cleanup/remove-legacy-branch; do
            curl --fail-with-body --silent --show-error \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/${branch}" || true
          done
      - name: Remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remove-legacy-branch.yml
          git commit -m "remove branch cleanup workflow"
          git push origin HEAD:main
